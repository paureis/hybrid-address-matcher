name: Deploy .NET Backend to Azure App Service

on:
  push:
    branches:
      - main

env:
  AZURE_WEBAPP_NAME: ccp-address-matcher-backend    # Your Azure App Service name
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore CCP.AddressMatcher.sln
      working-directory: CCP.AddressMatcher

    - name: Build
      run: dotnet build CCP.AddressMatcher.sln --configuration Release --no-restore
      working-directory: CCP.AddressMatcher

    - name: Publish
      run: dotnet publish CCP.AddressMatcher.sln -c Release -o publish
      working-directory: CCP.AddressMatcher

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: CCP.AddressMatcher/publish
